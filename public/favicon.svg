<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- インディゴ・グラス（EXBadge 前面と同系: indigo-500→indigo-600） -->
    <linearGradient id="exGlass" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- EX 文字グラデ（EXBadge と同じ cyan-300 → indigo-200 → violet-400） -->
    <linearGradient id="exInk" x1="120" y1="150" x2="392" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="exGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ベース＋インディゴグラス面（EXBadge 前面の質感を再現） -->
  <rect width="512" height="512" rx="116" fill="#0f172a"/>
  <rect width="512" height="512" rx="116" fill="url(#exGlass)" fill-opacity="0.55"/>
  <rect x="6" y="6" width="500" height="500" rx="112" fill="none" stroke="#a5b4fc" stroke-opacity="0.55" stroke-width="6"/>

  <!-- EX（単一グラデ＋グロウ。ホーム/ログインの EX ロゴと同配色） -->
  <g fill="url(#exInk)" filter="url(#exGlow)">
    <rect x="131" y="156" width="42" height="200" rx="6"/>
    <rect x="131" y="156" width="112" height="40" rx="6"/>
    <rect x="131" y="236" width="94" height="38" rx="6"/>
    <rect x="131" y="316" width="112" height="40" rx="6"/>
    <polygon points="271,156 306,156 381,356 346,356"/>
    <polygon points="346,156 381,156 306,356 271,356"/>
  </g>
</svg>
