<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EX-event-manager</title>
    <meta name="description" content="EX事業部 イベント管理システム — 日程・準備物・写真を一元管理" />

    <!-- Pre-JS background prevents white flash on cold start -->
    <style>html { background: linear-gradient(180deg, #082f49 0%, #0e7490 100%) }</style>

    <!-- PWA / ホーム画面追加 -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#082f49" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS standalone（ホーム画面から全画面起動） -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ivent Manager" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
