<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experience — 3D</title>
    <style>
      /* Canvasが表示される前に背景が白く光らないよう、
         インラインスタイルで濃紺を先に塗る */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #experience-root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060A; /* 定数 BG_COLOR に対応 */
      }
    </style>
  </head>
  <body>
    <div id="experience-root"></div>
    <!-- Viteがこのエントリから experience 専用バンドルを生成する -->
    <script type="module" src="/src/experience/main.tsx"></script>
  </body>
</html>
